<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Statistics - REBUILT 2026</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/theme.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="page-body--padded" x-data="statisticsApp">
    <nav class="top-nav">
        <div class="top-nav__inner">
            <div class="top-nav__left">
                <button @click="location.href='dashboard.html'" class="back-btn--shadow p-2">
                    <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" />
                    </svg>
                </button>
            </div>

            <div class="top-nav__center">
                <img src="img/logo.png" alt="REBUILT Logo" class="brand__logo--nav">
                <span class="brand__subtitle--orange">Analytics</span>
            </div>

            <div class="top-nav__right">
                <button @click="$store.display.toggle()" class="back-btn--shadow p-2">
                    <svg x-show="$store.display.mode === 'desktop'" class="h-5 w-5 text-slate-400" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z" />
                    </svg>
                    <svg x-show="$store.display.mode === 'mobile'" class="h-5 w-5 text-slate-400" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <section class="page-hero">
        <h1 class="page-hero__title">System Insights</h1>
        <p class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.2em] mt-1 -translate-y-2">Real-time data
            aggregation</p>
    </section>

    <main class="max-w-4xl mx-auto px-4 mt-6">
        <!-- Loading State -->
        <div x-show="loadingStats" class="flex flex-col items-center justify-center p-20 animate-pulse">
            <div class="w-8 h-8 border-2 border-orange-500 border-t-transparent rounded-full animate-spin mb-4"></div>
            <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Compiling Database...</span>
        </div>

        <div x-show="!loadingStats" x-transition.opacity>
            <!-- High Level Stats -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                <div
                    class="bg-gradient-to-br from-slate-800/50 to-slate-900/50 border border-white/5 p-5 rounded-3xl backdrop-blur-xl shadow-2xl relative overflow-hidden group">
                    <div class="absolute top-0 right-0 p-2 opacity-10 group-hover:opacity-20 transition-opacity">
                        <svg class="h-12 w-12 text-orange-500" fill="currentColor" viewBox="0 0 24 24">
                            <path
                                d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14z" />
                            <path d="M7 10h2v7H7zm4-3h2v10h-2zm4 6h2v4h-2z" />
                        </svg>
                    </div>
                    <span class="block text-[9px] font-black text-slate-500 uppercase tracking-widest mb-1">Reports
                        Total</span>
                    <span
                        class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-white to-slate-400"
                        x-text="stats.scoutedMatches + stats.pitReports"></span>
                </div>
                <div
                    class="bg-gradient-to-br from-slate-800/50 to-slate-900/50 border border-white/5 p-5 rounded-3xl backdrop-blur-xl shadow-2xl relative overflow-hidden group">
                    <div class="absolute top-0 right-0 p-2 opacity-10 group-hover:opacity-20 transition-opacity">
                        <svg class="h-12 w-12 text-blue-500" fill="currentColor" viewBox="0 0 24 24">
                            <path
                                d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
                        </svg>
                    </div>
                    <span class="block text-[9px] font-black text-slate-500 uppercase tracking-widest mb-1">Active
                        Scouts</span>
                    <span
                        class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-white to-slate-400"
                        x-text="stats.totalUsers"></span>
                </div>
                <div
                    class="bg-gradient-to-br from-slate-800/50 to-slate-900/50 border border-white/5 p-5 rounded-3xl backdrop-blur-xl shadow-2xl relative overflow-hidden group">
                    <div class="absolute top-0 right-0 p-2 opacity-10 group-hover:opacity-20 transition-opacity">
                        <svg class="h-12 w-12 text-orange-500" fill="currentColor" viewBox="0 0 24 24">
                            <path
                                d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5s-3 1.34-3 3 1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z" />
                        </svg>
                    </div>
                    <span class="block text-[9px] font-black text-slate-500 uppercase tracking-widest mb-1">Teams
                        Tracked</span>
                    <span
                        class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-white to-slate-400"
                        x-text="stats.totalTeams"></span>
                </div>
                <div
                    class="bg-gradient-to-br from-slate-800/50 to-slate-900/50 border border-white/5 p-5 rounded-3xl backdrop-blur-xl shadow-2xl relative overflow-hidden group">
                    <div class="absolute top-0 right-0 p-2 opacity-10 group-hover:opacity-20 transition-opacity">
                        <svg class="h-12 w-12 text-green-500" fill="currentColor" viewBox="0 0 24 24">
                            <path
                                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z" />
                        </svg>
                    </div>
                    <span class="block text-[9px] font-black text-slate-500 uppercase tracking-widest mb-1">Events
                        Open</span>
                    <span
                        class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-white to-slate-400"
                        x-text="stats.totalRegionals"></span>
                </div>
            </div>

            <!-- Leaderboards Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-20">
                <!-- Active Scouter Teams -->
                <div class="space-y-4">
                    <div class="flex items-center justify-between border-b border-white/5 pb-2">
                        <h3 class="text-[10px] font-black text-orange-500 uppercase tracking-widest">Most Active
                            Scouters</h3>
                        <span class="text-[8px] text-slate-600 font-bold uppercase">Reports Count</span>
                    </div>
                    <div class="space-y-2">
                        <template x-for="(item, index) in stats.topScouterTeams" :key="item.key">
                            <div
                                class="flex items-center justify-between p-3 bg-slate-900/20 border border-white/5 rounded-xl group hover:bg-orange-500/5 transition-all">
                                <div class="flex items-center gap-3">
                                    <span class="text-[10px] font-black text-slate-700 w-4" x-text="index + 1"></span>
                                    <span class="text-[11px] font-black text-slate-200"
                                        x-text="'Team ' + item.key"></span>
                                </div>
                                <div class="px-2 py-0.5 bg-orange-500/10 rounded-full border border-orange-500/20">
                                    <span class="text-[9px] font-black text-orange-400" x-text="item.count"></span>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- Most Scouted Teams -->
                <div class="space-y-4">
                    <div class="flex items-center justify-between border-b border-white/5 pb-2">
                        <h3 class="text-[10px] font-black text-orange-500 uppercase tracking-widest">Most Observed Teams
                        </h3>
                        <span class="text-[8px] text-slate-600 font-bold uppercase">Scout Instances</span>
                    </div>
                    <div class="space-y-2">
                        <template x-for="(item, index) in stats.topScoutedTeams" :key="item.key">
                            <div
                                class="flex items-center justify-between p-3 bg-slate-900/20 border border-white/5 rounded-xl group hover:bg-orange-500/5 transition-all">
                                <div class="flex items-center gap-3">
                                    <span class="text-[10px] font-black text-slate-700 w-4" x-text="index + 1"></span>
                                    <span class="text-[11px] font-black text-slate-200" x-text="'#' + item.key"></span>
                                </div>
                                <div class="px-2 py-0.5 bg-orange-500/10 rounded-full border border-orange-500/20">
                                    <span class="text-[9px] font-black text-orange-400" x-text="item.count"></span>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- Scouter Communities -->
                <div class="space-y-4">
                    <div class="flex items-center justify-between border-b border-white/5 pb-2">
                        <h3 class="text-[10px] font-black text-orange-500 uppercase tracking-widest">User Communities
                        </h3>
                        <span class="text-[8px] text-slate-600 font-bold uppercase">Accounts</span>
                    </div>
                    <div class="space-y-2">
                        <template x-for="(item, index) in stats.topUserTeams" :key="item.key">
                            <div
                                class="flex items-center justify-between p-3 bg-slate-900/20 border border-white/5 rounded-xl group hover:bg-orange-500/5 transition-all">
                                <div class="flex items-center gap-3">
                                    <span class="text-[10px] font-black text-slate-700 w-4" x-text="index + 1"></span>
                                    <span class="text-[11px] font-black text-slate-200"
                                        x-text="'Team ' + item.key"></span>
                                </div>
                                <div class="px-2 py-0.5 bg-slate-800 rounded-full border border-white/10">
                                    <span class="text-[9px] font-black text-slate-400" x-text="item.count"></span>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- Regionals Activity -->
                <div class="space-y-4">
                    <div class="flex items-center justify-between border-b border-white/5 pb-2">
                        <h3 class="text-[10px] font-black text-orange-500 uppercase tracking-widest">Regional Activity
                        </h3>
                        <span class="text-[8px] text-slate-600 font-bold uppercase">Total Reports</span>
                    </div>
                    <div class="space-y-2">
                        <template x-for="(item, index) in stats.topScoutedRegionals" :key="item.key">
                            <div
                                class="flex items-center justify-between p-3 bg-slate-900/20 border border-white/5 rounded-xl group hover:bg-orange-500/5 transition-all">
                                <div class="flex items-center gap-3">
                                    <span class="text-[10px] font-black text-slate-700 w-4" x-text="index + 1"></span>
                                    <span class="text-[11px] font-black text-slate-200 truncate max-w-[150px]"
                                        x-text="item.name"></span>
                                </div>
                                <div class="px-2 py-0.5 bg-slate-800 rounded-full border border-white/10">
                                    <span class="text-[9px] font-black text-slate-400" x-text="item.count"></span>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/statistics-app.js"></script>
    <script src="js/frc-config.js"></script>
</body>

</html>
