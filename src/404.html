<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      // Single Page Apps for GitHub Pages
      // Mitigates completely the 404 error
      var pathSegmentsToKeep = 0; // Number of directories attached to repo name

      var l = window.location;
      
      // Determine what page to redirect to based on path
      // Path format: /1:league/2:season/3:event/4:page
      var path = l.pathname.split('/');
      // Filter out empty strings
      path = path.filter(p => p.length > 0);

      var basePath = '';
      if (path[0] === '8056scout26') {
          basePath = '/8056scout26';
          path.shift();
      }
      
      var targetPage = 'index.html'; // default
      var params = l.search;

      if (path.length >= 2) {
          var league = path[0];
          var season = path[1];
          var pageOrEvent = path[2]; // could be 'dashboard', 'teams', or an event key
          var pageIfEvent = path[3]; // if path[2] is event, this is 'matches'
          var subId = path[4] || '';

          var q = new URLSearchParams(params);
          q.set('league', league);
          q.set('season', season);

          // Pattern: /league/season/page
          if (['dashboard', 'teams', 'matches', 'regionals', 'scout', 'pit-scout', 'statistics', 'account', 'info', 'feedback', 'accept'].includes(pageOrEvent)) {
              if (pageOrEvent === 'scout' || pageOrEvent === 'pit-scout') {
                  targetPage = pageOrEvent + '_' + league + '_' + season + '.html';
              } else {
                  targetPage = pageOrEvent + '.html';
              }
          } 
          // Pattern: /league/season/event/page
          else if (pageOrEvent && ['matches', 'teams', 'regionals'].includes(pageIfEvent)) {
              q.set('regional', pageOrEvent);
              if (pageIfEvent === 'scout' || pageIfEvent === 'pit-scout') {
                  targetPage = pageIfEvent + '_' + league + '_' + season + '.html';
              } else {
                  targetPage = pageIfEvent + '.html';
              }
              if (pageIfEvent === 'matches' && subId) {
                  q.set('match', subId.replace(/\D/g,''));
              }
          }
          // Default to dashboard if just /league/season
          else if (path.length === 2) {
              targetPage = 'dashboard.html';
          }

          params = '?' + q.toString();
      }

      var redirectUrl = l.origin + basePath + '/' + targetPage + params + l.hash;
      console.log('Redirecting to:', redirectUrl);
      window.location.replace(redirectUrl);
    </script>
  </head>
  <body>
    Loading...
  </body>
</html>
