<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regional Explorer - REBUILT 2026</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/theme.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="page-body" x-data="regionalsApp">
    <nav class="top-nav">
        <div class="top-nav__inner">
            <div class="top-nav__left">
                <button @click="location.href='dashboard.html'" class="back-btn--shadow">
                    <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7">
                        </path>
                    </svg>
                </button>
            </div>
            <div class="top-nav__center">
                <img src="img/logo.png" alt="Logo" class="brand__logo--nav">
                <span class="brand__subtitle--orange">Laissez Faire</span>
            </div>
        </div>
    </nav>

    <section class="page-hero">
        <h1 class="page-hero__title">Regional Explorer</h1>
    </section>

    <div class="filter-panel px-4 mb-6">
        <div class="filter-group col-span-full">
            <label class="form-label--filter uppercase tracking-widest text-[10px] text-slate-500 font-black">Search
                Regionals</label>
            <div class="relative">
                <input x-model="searchQuery" type="text" placeholder="Search Regional..."
                    class="form-input--search pl-10">
                <svg class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-slate-500" fill="none"
                    stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>
        </div>
    </div>

    <div class="match-grid">
        <template x-for="event in filteredRegionals" :key="event.key">
            <div class="match-card-new"
                :class="expandedRegionals.includes(event.key) ? 'ring-2 ring-orange-500/50' : ''">
                <div @click="toggleRegional(event.key)" class="match-card__header cursor-pointer">
                    <div class="flex flex-col">
                        <span class="text-[10px] text-orange-500 font-black uppercase tracking-widest"
                            x-text="event.season"></span>
                        <div class="flex items-center gap-2">
                             <span class="font-black text-white text-lg leading-tight" x-text="event.name"></span>
                             <!-- TBA Button -->
                             <a :href="'https://www.thebluealliance.com/event/' + event.key" 
                                target="_blank"
                                @click.stop
                                class="px-2 py-0.5 bg-blue-600 hover:bg-blue-500 text-white rounded text-[8px] font-black uppercase tracking-tighter transition-all shadow-sm">
                                TBA
                             </a>
                        </div>
                        <span class="text-[10px] text-slate-500 font-bold uppercase tracking-wider"
                            x-text="event.key"></span>
                    </div>
                    <svg class="match-card__chevron transition-transform duration-300"
                        :class="expandedRegionals.includes(event.key) ? 'rotate-180' : ''" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path>
                    </svg>
                </div>

                <div x-show="expandedRegionals.includes(event.key)" x-collapse class="match-expanded">
                    <template x-if="regionalData[event.key]?.loading">
                        <div class="p-8 flex flex-col items-center justify-center space-y-3">
                            <div class="loading-spinner"></div>
                            <p class="text-[10px] font-black text-orange-500 uppercase tracking-[0.3em]">Syncing
                                Regional Intel...</p>
                        </div>
                    </template>

                    <template x-if="!regionalData[event.key]?.loading">
                        <div x-data="{ tab: 'matches' }">
                            <!-- Team Search Bar Inside Regional -->
                            <div class="px-4 py-3 bg-slate-900/80 border-b border-slate-800 flex items-center gap-3">
                                <div class="relative flex-1">
                                    <input x-model="teamSearchQuery" type="text"
                                        placeholder="Search Team..."
                                        class="w-full bg-slate-950 border border-slate-800 rounded-lg py-1.5 pl-8 pr-3 text-[10px] text-white focus:outline-none focus:border-orange-500/50 transition-all">
                                    <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 h-3.5 w-3.5 text-slate-500"
                                        fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                                    </svg>
                                </div>
                            </div>

                            <div class="flex border-b border-slate-800 bg-slate-900/50">
                                <button @click="tab = 'matches'"
                                    :class="tab === 'matches' ? 'border-orange-500 text-orange-500 bg-orange-500/5' : 'border-transparent text-slate-500'"
                                    class="flex-1 py-3 text-[10px] font-black uppercase tracking-widest border-b-2 transition-all">Matches</button>
                                <button @click="tab = 'rankings'"
                                    :class="tab === 'rankings' ? 'border-orange-500 text-orange-500 bg-orange-500/5' : 'border-transparent text-slate-500'"
                                    class="flex-1 py-3 text-[10px] font-black uppercase tracking-widest border-b-2 transition-all">Rankings</button>
                                <button @click="tab = 'prizes'"
                                    :class="tab === 'prizes' ? 'border-orange-500 text-orange-500 bg-orange-500/5' : 'border-transparent text-slate-500'"
                                    class="flex-1 py-3 text-[10px] font-black uppercase tracking-widest border-b-2 transition-all">Prizes</button>
                            </div>

                            <!-- Matches Section -->
                            <div x-show="tab === 'matches'" class="p-2 space-y-2">
                                <template x-for="match in getFilteredMatches(event.key)"
                                    :key="match.matchNumber + match.compLevel">
                                    <div class="bg-slate-800/20 border border-slate-700/30 rounded-lg overflow-hidden">
                                        <div @click="toggleMatch(event.key + match.compLevel + match.matchNumber)"
                                            class="p-3 flex items-center justify-between cursor-pointer hover:bg-slate-800/40 transition-colors">
                                            <div class="flex items-center gap-3">
                                                <div class="flex flex-col">
                                                    <span class="text-[10px] font-black text-orange-500 uppercase"
                                                        x-text="match.description"></span>
                                                    <span class="text-[9px] text-slate-500 font-bold"
                                                        x-text="match.actualStartTime ? formatDate(match.actualStartTime) : (match.scheduledTime ? 'Scheduled: ' + formatDate(match.scheduledTime) : 'Pending')"></span>
                                                </div>
                                            </div>
                                            <div class="flex items-center gap-4">
                                                <template x-if="match.actualStartTime">
                                                    <div
                                                        class="flex items-center gap-2 px-2 py-1 bg-slate-900/50 rounded border border-slate-700/50">
                                                        <span class="text-[11px] font-black text-red-500"
                                                            x-text="match.scoreRedFinal || 0"></span>
                                                        <div class="w-1.5 h-1.5 rounded-full bg-slate-700"></div>
                                                        <span class="text-[11px] font-black text-blue-500"
                                                            x-text="match.scoreBlueFinal || 0"></span>
                                                    </div>
                                                </template>
                                                <template x-if="!match.actualStartTime">
                                                    <span
                                                        class="text-[9px] text-slate-600 font-black uppercase tracking-widest italic"
                                                        x-text="match.scheduledTime ? 'Upcoming' : 'Pending'"></span>
                                                </template>
                                                <svg class="w-3 h-3 text-slate-600 transition-transform"
                                                    :class="expandedMatches.includes(event.key + match.compLevel + match.matchNumber) ? 'rotate-180' : ''"
                                                    fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path stroke-linecap="round" stroke-linejoin="round"
                                                        stroke-width="3" d="M19 9l-7 7-7-7"></path>
                                                </svg>
                                            </div>
                                        </div>
                                        <!-- Expand Match -->
                                        <div x-show="expandedMatches.includes(event.key + match.compLevel + match.matchNumber)"
                                            x-collapse
                                            class="p-4 border-t border-slate-800/80 bg-slate-900/40 space-y-4">

                                            <!-- Alliance Teams -->
                                            <div class="grid grid-cols-2 gap-4 text-center">
                                                <div class="space-y-2">
                                                    <span
                                                        class="text-[9px] font-black text-red-500 uppercase tracking-widest border-b border-red-500/20 pb-1 block">Red
                                                        Alliance</span>
                                                    <template
                                                        x-for="t in match.teams.filter(t => t.station.startsWith('Red'))">
                                                        <div @click.stop="location.href='teams.html?team=' + t.teamNumber"
                                                            class="flex flex-col items-center justify-center bg-red-500/5 py-1.5 px-2 rounded border border-red-500/10 cursor-pointer hover:bg-red-500/20 transition-all"
                                                            :class="isHighlighted(t.teamNumber) ? 'ring-2 ring-red-500 bg-red-500/30' : ''">
                                                            <span class="text-[10px] text-white font-black" x-text="'#' + t.teamNumber"></span>
                                                            <span class="text-[8px] text-red-400 font-bold uppercase truncate max-w-[80px]" x-text="getTeamData(t.teamNumber, event.key).nickname"></span>
                                                        </div>
                                                    </template>
                                                </div>
                                                <div class="space-y-2">
                                                    <span
                                                        class="text-[9px] font-black text-blue-500 uppercase tracking-widest border-b border-blue-500/20 pb-1 block">Blue
                                                        Alliance</span>
                                                    <template
                                                        x-for="t in match.teams.filter(t => t.station.startsWith('Blue'))">
                                                        <div @click.stop="location.href='teams.html?team=' + t.teamNumber"
                                                            class="flex flex-col items-center justify-center bg-blue-500/5 py-1.5 px-2 rounded border border-blue-500/10 cursor-pointer hover:bg-blue-500/20 transition-all"
                                                            :class="isHighlighted(t.teamNumber) ? 'ring-2 ring-blue-500 bg-blue-500/30' : ''">
                                                            <span class="text-[10px] text-white font-black" x-text="'#' + t.teamNumber"></span>
                                                            <span class="text-[8px] text-blue-400 font-bold uppercase truncate max-w-[80px]" x-text="getTeamData(t.teamNumber, event.key).nickname"></span>
                                                        </div>
                                                    </template>
                                                </div>
                                            </div>

                                            <div class="flex gap-2">
                                                <a :href="`scout.html?season=${event.season}&regional=${event.key}&type=${match.compLevel === 'qm' ? 'Qualification' : (match.compLevel === 'p' ? 'Practice' : (match.compLevel === 'f' ? 'Finals' : 'Playoffs'))}&match=${match.matchNumber}`"
                                                    class="flex-1 py-1.5 bg-orange-600 hover:bg-orange-500 text-white rounded text-[10px] font-black uppercase flex items-center justify-center gap-2 shadow-lg shadow-orange-900/20 transition-all">
                                                    <svg class="w-3 h-3" fill="none" stroke="currentColor"
                                                        viewBox="0 0 24 24">
                                                        <path stroke-linecap="round" stroke-linejoin="round"
                                                            stroke-width="3"
                                                            d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z">
                                                        </path>
                                                    </svg>
                                                    Scout Match
                                                </a>
                                                <a :href="FRC_CONFIG.getTbaMatchUrl(event.key, match.compLevel === 'qm' ? 'Qualification' : (match.compLevel === 'p' ? 'Practice' : (match.compLevel === 'f' ? 'Finals' : 'Playoffs')), match.matchNumber)"
                                                    target="_blank"
                                                    class="px-3 py-1.5 bg-blue-600 hover:bg-blue-500 text-white rounded text-[10px] font-black uppercase flex items-center justify-center gap-2 transition-all">
                                                    TBA
                                                </a>
                                                <a :href="`matches.html?regionals=${event.key}&match=${match.matchNumber}`"
                                                    class="px-3 py-1.5 bg-slate-800/50 hover:bg-orange-500/20 text-slate-400 hover:text-orange-400 rounded border border-slate-700 hover:border-orange-500/40 text-[10px] font-black uppercase transition-all flex items-center justify-center gap-2">
                                                    Matches
                                                </a>
                                            </div>

                                            <!-- New API Match Breakdown -->
                                            <div class="mt-4 border-t border-slate-800/50 pt-3">
                                                <button @click="toggleApi(event.key + match.compLevel + match.matchNumber)"
                                                    class="w-full flex items-center justify-between px-3 py-2 bg-slate-900/50 hover:bg-slate-800 rounded-lg border border-slate-700/50 transition-colors">
                                                    <span class="text-[10px] font-black uppercase tracking-widest text-slate-400">Full API Match Breakdown</span>
                                                    <svg class="w-3.5 h-3.5 text-slate-500 transition-transform duration-300"
                                                        :class="expandedApiMatches.includes(event.key + match.compLevel + match.matchNumber) ? 'rotate-180' : ''" fill="none" stroke="currentColor"
                                                        viewBox="0 0 24 24">
                                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                                            d="M19 9l-7 7-7-7"></path>
                                                    </svg>
                                                </button>

                                                <div x-show="expandedApiMatches.includes(event.key + match.compLevel + match.matchNumber)" x-collapse class="mt-2 grid grid-cols-2 gap-2">
                                                    <template x-if="match.rawScoreBreakdown">
                                                        <template x-for="alliance in ['red', 'blue']">
                                                            <div :class="alliance === 'red' ? 'bg-red-500/5 border-red-500/10' : 'bg-blue-500/5 border-blue-500/10'"
                                                                class="rounded-lg border p-2.5">
                                                                <h5 :class="alliance === 'red' ? 'text-red-400' : 'text-blue-400'"
                                                                    class="text-[9px] font-black uppercase tracking-tighter mb-2 border-b pb-1"
                                                                    x-text="alliance + ' alliance'"></h5>

                                                                <div class="space-y-1.5">
                                                                    <div class="mb-2 pb-1 border-b border-white/5">
                                                                        <span class="text-[8px] font-black text-slate-600 uppercase tracking-widest">Main Scores</span>
                                                                    </div>
                                                                    <template x-for="item in [
                                                                        { label: 'Auto Points', val: match.rawScoreBreakdown[alliance].totalAutoPoints },
                                                                        { label: 'Teleop Points', val: match.rawScoreBreakdown[alliance].totalTeleopPoints },
                                                                        { label: 'Tower Points', val: match.rawScoreBreakdown[alliance].totalTowerPoints },
                                                                        { label: 'Foul Points', val: match.rawScoreBreakdown[alliance].foulPoints },
                                                                        { label: 'Major Fouls', val: match.rawScoreBreakdown[alliance].majorFoulCount },
                                                                        { label: 'Minor Fouls', val: match.rawScoreBreakdown[alliance].minorFoulCount },
                                                                        { label: 'Adjustments', val: match.rawScoreBreakdown[alliance].adjustPoints },
                                                                        { label: 'Total Points', val: match.rawScoreBreakdown[alliance].totalPoints },
                                                                        { label: 'RP Earned', val: match.rawScoreBreakdown[alliance].rp }
                                                                    ]" :key="item.label">
                                                                        <div class="flex justify-between items-center text-[9px] font-bold">
                                                                            <span class="text-slate-500" x-text="item.label"></span>
                                                                            <span :class="alliance === 'red' ? 'text-red-300' : 'text-blue-300'"
                                                                                x-text="item.val || 0"></span>
                                                                        </div>
                                                                    </template>

                                                                    <div class="mt-3 mb-2 pb-1 border-b border-white/5">
                                                                        <span class="text-[8px] font-black text-slate-600 uppercase tracking-widest">Tower Robots</span>
                                                                    </div>
                                                                    <template x-for="robot in [1,2,3]" :key="robot">
                                                                        <div class="flex justify-between items-center text-[9px] font-bold opacity-80">
                                                                            <span class="text-slate-500" x-text="'Auto Robot ' + robot"></span>
                                                                            <span :class="alliance === 'red' ? 'text-red-300' : 'text-blue-300'"
                                                                                x-text="match.rawScoreBreakdown[alliance]['autoTowerRobot' + robot]"></span>
                                                                        </div>
                                                                    </template>
                                                                    <template x-for="robot in [1,2,3]" :key="robot">
                                                                        <div class="flex justify-between items-center text-[9px] font-bold opacity-80">
                                                                            <span class="text-slate-500" x-text="'Endgame Robot ' + robot"></span>
                                                                            <span :class="alliance === 'red' ? 'text-red-300' : 'text-blue-300'"
                                                                                x-text="match.rawScoreBreakdown[alliance]['endGameTowerRobot' + robot]"></span>
                                                                        </div>
                                                                    </template>

                                                                    <div class="mt-3 mb-2 pb-1 border-b border-white/5">
                                                                        <span class="text-[8px] font-black text-slate-600 uppercase tracking-widest">Hub Activity</span>
                                                                    </div>
                                                                    <template x-if="match.rawScoreBreakdown[alliance].hubScore">
                                                                        <div class="space-y-1">
                                                                            <template x-for="shift in ['Auto', 'Transition', 'Shift1', 'Shift2', 'Shift3', 'Shift4', 'Teleop', 'Endgame']"
                                                                                :key="shift">
                                                                                <div class="flex justify-between items-center text-[9px] font-bold">
                                                                                    <span class="text-slate-500" x-text="shift + ' Score'"></span>
                                                                                    <div class="flex gap-2">
                                                                                        <span class="text-slate-600"
                                                                                            x-text="match.rawScoreBreakdown[alliance].hubScore[shift.toLowerCase() + 'Count'] || 0"></span>
                                                                                        <span :class="alliance === 'red' ? 'text-red-300' : 'text-blue-300'"
                                                                                            x-text="match.rawScoreBreakdown[alliance].hubScore[shift.toLowerCase() + 'Points'] || 0"></span>
                                                                                    </div>
                                                                                </div>
                                                                            </template>
                                                                        </div>
                                                                    </template>
                                                                    <div class="mt-3 mb-2 pb-1 border-b border-white/5">
                                                                        <span class="text-[8px] font-black text-slate-600 uppercase tracking-widest">Achievements</span>
                                                                    </div>
                                                                    <template x-for="ach in [
                                                                        { label: 'Energized', val: match.rawScoreBreakdown[alliance].energizedAchieved },
                                                                        { label: 'Supercharged', val: match.rawScoreBreakdown[alliance].superchargedAchieved },
                                                                        { label: 'Traversal', val: match.rawScoreBreakdown[alliance].traversalAchieved },
                                                                        { label: 'G206 Penalty', val: match.rawScoreBreakdown[alliance].g206Penalty }
                                                                    ]" :key="ach.label">
                                                                        <div class="flex justify-between items-center text-[9px] font-bold">
                                                                            <span class="text-slate-500" x-text="ach.label"></span>
                                                                            <span
                                                                                :class="ach.val ? (alliance === 'red' ? 'text-red-400' : 'text-blue-400') : 'text-slate-700'"
                                                                                x-text="ach.val ? 'YES' : 'NO'"></span>
                                                                        </div>
                                                                    </template>
                                                                </div>
                                                            </div>
                                                        </template>
                                                    </template>
                                                    <template x-if="!match.rawScoreBreakdown">
                                                        <div class="col-span-2 py-4 text-center">
                                                            <span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">No API data available for this match</span>
                                                        </div>
                                                    </template>
                                                </div>
                                            </div>

                                            <!-- Watch Match Video -->
                                            <div class="mt-2 border-t border-slate-800/50 pt-3" x-data="{ expandedVideo: false }">
                                                <button @click="expandedVideo = !expandedVideo"
                                                    class="w-full flex items-center justify-between px-3 py-2 bg-slate-900/50 hover:bg-slate-800 rounded-lg border border-slate-700/50 transition-colors">
                                                    <div class="flex items-center gap-2">
                                                        <svg class="w-3.5 h-3.5 text-red-500" fill="currentColor" viewBox="0 0 24 24">
                                                            <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                                                        </svg>
                                                        <span class="text-[10px] font-black uppercase tracking-widest text-slate-400">Watch Match Video</span>
                                                    </div>
                                                    <svg class="w-3.5 h-3.5 text-slate-500 transition-transform duration-300"
                                                        :class="expandedVideo ? 'rotate-180' : ''" fill="none" stroke="currentColor"
                                                        viewBox="0 0 24 24">
                                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                                            d="M19 9l-7 7-7-7"></path>
                                                    </svg>
                                                </button>

                                                <div x-show="expandedVideo" x-collapse x-transition.opacity class="mt-2">
                                                    <template x-if="match.videos && match.videos.find(v => v.type?.toLowerCase() === 'youtube')">
                                                        <div class="aspect-video w-full rounded-lg overflow-hidden bg-black border border-slate-700/50">
                                                            <iframe class="w-full h-full"
                                                                :src="'https://www.youtube.com/embed/' + match.videos.find(v => v.type?.toLowerCase() === 'youtube').key"
                                                                frameborder="0"
                                                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                                                                allowfullscreen>
                                                            </iframe>
                                                        </div>
                                                    </template>
                                                    <template x-if="!(match.videos && match.videos.find(v => v.type?.toLowerCase() === 'youtube'))">
                                                        <div class="py-6 flex flex-col items-center justify-center bg-slate-900/40 rounded-lg border border-slate-700/30">
                                                            <svg class="w-8 h-8 text-slate-600 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                                                            </svg>
                                                            <p class="text-[10px] text-slate-500 italic uppercase tracking-widest">No match video available</p>
                                                        </div>
                                                    </template>
                                                </div>
                                            </div>

                                            <!-- Scouted Data (Bottom) -->
                                            <div class="mt-6 space-y-4">
                                                <h4 class="text-[10px] font-black text-orange-500 uppercase tracking-[0.2em] border-b border-orange-500/20 pb-2">Scouting Reports</h4>
                                                <div class="space-y-3">
                                                    <template x-for="entry in scoutEntries[event.key + '_' + (match.compLevel === 'qm' ? 'Qualification' : (match.compLevel === 'p' ? 'Practice' : (match.compLevel === 'f' ? 'Finals' : 'Playoffs'))) + '_' + match.matchNumber] || []" :key="entry.id">
                                                        <div class="scout-report">
                                                            <!-- Expandable Summary Header -->
                                                            <div @click="toggleReport(entry.id)" class="scout-report__summary-header">
                                                                <div class="scout-report__summary-left">
                                                                    <div class="flex flex-col">
                                                                        <div class="flex items-center gap-1.5">
                                                                            <div class="scout-report__team-badge--sm"
