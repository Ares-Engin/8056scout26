<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - REBUILT 2026</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Theme Manager -->
  <script src="js/theme.js"></script>
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <!-- Alpine.js -->
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="page-body--padded" x-data="dashboardApp">
  <nav class="top-nav">
    <div class="top-nav__inner">
      <div class="top-nav__left">
        <div class="flex items-center gap-2">
          <button @click="location.href='account.html'" class="back-btn--shadow p-2">
            <svg class="h-5 w-5 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
            </svg>
          </button>
          <button @click="auth.signOut().then(() => location.href = 'index.html')" class="back-btn--shadow p-2">
            <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
            </svg>
          </button>
        </div>
      </div>

      <div class="top-nav__center">
        <img src="img/logo.png" alt="REBUILT Logo" class="brand__logo--nav">
        <span class="brand__subtitle--orange">Laissez Faire</span>
      </div>

      <div class="top-nav__right">
      </div>
    </div>
  </nav>

  <section class="page-hero">
    <h1 class="page-hero__title">REBUILT 2026</h1>
  </section>

  <main class="dashboard-grid">
    <!-- Scout Match -->
    <button @click="location.href='scout.html'" class="dashboard-card">
      <div class="dashboard-card__icon">
        <svg class="icon-lg" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
      </div>
      <h2 class="dashboard-card__title">Scout Match</h2>
      <p class="dashboard-card__desc">Start recording data for a live match</p>
      <div class="dashboard-card__link">
        Open App <svg class="icon-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
        </svg>
      </div>
    </button>

    <!-- View Matches -->
    <button @click="location.href='matches.html'" class="dashboard-card--blue">
      <div class="dashboard-card__icon--blue">
        <svg class="icon-lg--blue" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10">
          </path>
        </svg>
      </div>
      <h2 class="dashboard-card__title">View Matches</h2>
      <p class="dashboard-card__desc">Historical data and alliance scores</p>
      <div class="dashboard-card__link--blue">
        Open Results <svg class="icon-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
        </svg>
      </div>
    </button>

    <!-- Teams & Pit Scouting -->
    <button @click="location.href='teams.html'" class="dashboard-card--orange">
      <div class="dashboard-card__icon--orange">
        <svg class="icon-lg--orange" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z">
          </path>
        </svg>
      </div>
      <h2 class="dashboard-card__title">Teams Explorer</h2>
      <p class="dashboard-card__desc">Pit scouting and team analytics</p>
      <div class="dashboard-card__link--orange">
        Explore Teams <svg class="icon-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
        </svg>
      </div>
    </button>

    <!-- Info Section -->
    <button @click="location.href='info.html'" class="dashboard-card--admin bg-slate-800/40 border-slate-700/50">
      <div class="dashboard-card__admin-inner">
        <div class="dashboard-card__admin-content">
          <div class="dashboard-card__icon--admin bg-slate-700/30">
            <svg class="h-6 w-6 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
          </div>
          <div>
            <h2 class="dashboard-card__title">App Information</h2>
            <p class="dashboard-card__desc">Usage guide and pro tips</p>
          </div>
        </div>
        <svg class="icon-arrow--admin text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
        </svg>
      </div>
    </button>

    <!-- Feedback Section -->
    <button @click="location.href='feedback.html'" class="dashboard-card--admin bg-slate-800/40 border-slate-700/50">
      <div class="dashboard-card__admin-inner">
        <div class="dashboard-card__admin-content">
          <div class="dashboard-card__icon--admin bg-orange-500/10">
            <svg class="h-6 w-6 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"></path>
            </svg>
          </div>
          <div>
            <h2 class="dashboard-card__title">Feedback</h2>
            <p class="dashboard-card__desc">Share your thoughts and ratings</p>
          </div>
        </div>
        <svg class="icon-arrow--admin text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
        </svg>
      </div>
    </button>

    <!-- User Admin (Hidden if not admin) -->
    <button x-show="isAdmin" @click="location.href='accept.html'" class="dashboard-card--admin">
      <div class="dashboard-card__admin-inner">
        <div class="dashboard-card__admin-content">
          <div class="dashboard-card__icon--admin">
            <svg class="icon-lg--purple" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 4.354l1.1-.301 2.4 11.1-1.1.301-2.4-11.1zm-4 4.354l1.1-.301 2.4 11.1-1.1.301-2.4-11.1zm8 0l1.1-.301 2.4 11.1-1.1.301-2.4-11.1z">
              </path>
            </svg>
          </div>
          <div>
            <h2 class="dashboard-card__title">User Administration</h2>
            <p class="dashboard-card__desc">Accept new scouts and manage roles</p>
          </div>
        </div>
        <svg class="icon-arrow--admin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4 4H3"></path>
        </svg>
      </div>
    </button>
  </main>

  <!-- App Statistics Section -->
  <section class="max-w-4xl mx-auto px-4 mt-12 mb-20" x-show="!loadingStats">
    <div class="flex items-center gap-4 mb-8">
      <div class="h-px flex-1 bg-gradient-to-r from-transparent to-slate-800"></div>
      <h2 class="text-xs font-black uppercase tracking-[0.3em] text-orange-500 whitespace-nowrap">Team Insights & App
        Statistics</h2>
      <div class="h-px flex-1 bg-gradient-to-l from-transparent to-slate-800"></div>
    </div>

    <!-- Stats Grid -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12">
      <div class="bg-slate-900/40 border border-slate-700/30 p-4 rounded-2xl backdrop-blur-sm">
        <span class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Scouted Matches</span>
        <span class="text-2xl font-black text-white" x-text="stats.scoutedMatches"></span>
      </div>
      <div class="bg-slate-900/40 border border-slate-700/30 p-4 rounded-2xl backdrop-blur-sm">
        <span class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Pit Reports</span>
        <span class="text-2xl font-black text-white" x-text="stats.pitReports"></span>
      </div>
      <div class="bg-slate-900/40 border border-slate-700/30 p-4 rounded-2xl backdrop-blur-sm">
        <span class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Active Scouts</span>
        <span class="text-2xl font-black text-white" x-text="stats.totalUsers"></span>
      </div>
      <div class="bg-slate-900/40 border border-slate-700/30 p-4 rounded-2xl backdrop-blur-sm">
        <span class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Total Teams</span>
        <span class="text-2xl font-black text-white" x-text="stats.totalTeams"></span>
      </div>
    </div>

    <!-- Leaderboards -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
      <!-- Most Active Scouter Teams -->
      <div class="space-y-4">
        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
          <svg class="h-4 w-4 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z" />
          </svg>
          Active Scouter Teams
        </h3>
        <div class="bg-slate-900/20 border border-white/5 rounded-2xl overflow-hidden">
          <template x-for="(item, index) in stats.topScouterTeams" :key="item.key">
            <div
              class="flex items-center justify-between p-3 border-b border-white/5 group hover:bg-white/5 transition-colors">
              <div class="flex items-center gap-3">
                <span class="text-[10px] font-black text-slate-600 w-4" x-text="index + 1"></span>
                <span class="text-[11px] font-black text-slate-200" x-text="'Team ' + item.key"></span>
              </div>
              <span class="text-[10px] font-black text-orange-500/50 group-hover:text-orange-500"
                x-text="item.count + ' Rpts'"></span>
            </div>
          </template>
        </div>
      </div>

      <!-- Most Scouted Teams -->
      <div class="space-y-4">
        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
          <svg class="h-4 w-4 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
              d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
          </svg>
          Top Scouted Targets
        </h3>
        <div class="bg-slate-900/20 border border-white/5 rounded-2xl overflow-hidden">
          <template x-for="(item, index) in stats.topScoutedTeams" :key="item.key">
            <div
              class="flex items-center justify-between p-3 border-b border-white/5 group hover:bg-white/5 transition-colors">
              <div class="flex items-center gap-3">
                <span class="text-[10px] font-black text-slate-600 w-4" x-text="index + 1"></span>
                <span class="text-[11px] font-black text-slate-200" x-text="'#' + item.key"></span>
              </div>
              <span class="text-[10px] font-black text-orange-500/50 group-hover:text-orange-500"
                x-text="item.count + ' Obs'"></span>
            </div>
          </template>
        </div>
      </div>

      <!-- Teams with Most Users -->
      <div class="space-y-4">
        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
          <svg class="h-4 w-4 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
              d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
          </svg>
          User Communities
        </h3>
        <div class="bg-slate-900/20 border border-white/5 rounded-2xl overflow-hidden">
          <template x-for="(item, index) in stats.topUserTeams" :key="item.key">
            <div
              class="flex items-center justify-between p-3 border-b border-white/5 group hover:bg-white/5 transition-colors">
              <div class="flex items-center gap-3">
                <span class="text-[10px] font-black text-slate-600 w-4" x-text="index + 1"></span>
                <span class="text-[11px] font-black text-slate-200" x-text="'Team ' + item.key"></span>
              </div>
              <span class="text-[10px] font-black text-orange-500/50 group-hover:text-orange-500"
                x-text="item.count + ' Usrs'"></span>
            </div>
          </template>
        </div>
      </div>
    </div>
  </section>

  <!-- Loading Stats State -->
  <div x-show="loadingStats" class="flex flex-col items-center justify-center p-20 animate-pulse">
    <div class="w-8 h-8 border-2 border-orange-500 border-t-transparent rounded-full animate-spin mb-4"></div>
    <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Generating Insights...</span>
  </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard-app.js"></script>

</body>

</html>
