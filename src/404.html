<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      // Single Page Apps for GitHub Pages
      // Mitigates completely the 404 error
      var pathSegmentsToKeep = 0; // Number of directories attached to repo name

      var l = window.location;
      
      // Determine what page to redirect to based on path
      // Path format: /1:league/2:season/3:event/4:page
      var path = l.pathname.split('/');
      // Filter out empty strings
      path = path.filter(p => p.length > 0);
      
      var targetPage = 'index.html'; // default
      var params = l.search;

      if (path.length >= 4) {
          var league = path[0];
          var season = path[1];
          var event = path[2];
          var page = path[3];
          var matchNumber = path[4] || '';

          // Validate known pages
          if (['matches', 'scout', 'pit-scout', 'regionals'].includes(page)) {
              if (page === 'scout' || page === 'pit-scout') {
                  targetPage = page + '_' + league + '_' + season + '.html';
              } else {
                  targetPage = page + '.html';
              }
              
              // Forward the parameters behind the scenes
              var q = new URLSearchParams(params);
              q.set('league', league);
              q.set('season', season);
              q.set('regional', event);
              if (page === 'matches' && matchNumber) {
                  q.set('match', matchNumber.replace(/\D/g,''));
              }
              params = '?' + q.toString();
          }
      }

      var redirectUrl = l.origin + '/' + targetPage + params + l.hash;
      console.log('Redirecting to:', redirectUrl);
      window.location.replace(redirectUrl);
    </script>
  </head>
  <body>
    Loading...
  </body>
</html>
