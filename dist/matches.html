<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Results - REBUILT 2026</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/theme.js"></script>
    <script src="js/custom-events.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="page-body" x-data="matchesApp">
    <nav class="top-nav">
        <div class="top-nav__inner">
            <div class="top-nav__left">
                <button @click="location.href = $store.appState.url('dashboard')" class="back-btn--shadow">
                    <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                    </svg>
                </button>
            </div>
            <div class="top-nav__center">
                <img src="img/logo.png" alt="Logo" class="brand__logo--nav">
                <span class="brand__subtitle--orange">Laissez Faire</span>
            </div>
            <div class="top-nav__right"></div>
        </div>
    </nav>

    <section class="page-hero">
        <h1 class="page-hero__title">Match Results</h1>
    </section>

    <!-- Context Header -->
    <div class="bg-slate-900 border-b border-slate-800 px-4 py-3 sticky top-[64px] z-20">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <nav class="flex items-center gap-2 text-[10px] font-black uppercase tracking-widest">
                <a @click="location.href = $store.appState.url('dashboard')" class="text-slate-500 hover:text-orange-500 cursor-pointer" x-text="$store.appState.season"></a>
                <span class="text-slate-700">/</span>
                <span x-show="!$store.appState.regional" class="text-white">Events</span>
                <template x-if="$store.appState.regional">
                    <div class="flex items-center gap-2">
                        <a @click="location.href = $store.appState.url('matches')" class="text-slate-500 hover:text-orange-500 cursor-pointer">Events</a>
                        <span class="text-slate-700">/</span>
                        <span class="text-white" x-text="availableEvents.find(e => e.key === $store.appState.regional)?.name || $store.appState.regional"></span>
                    </div>
                </template>
            </nav>
            <div class="flex items-center gap-4">
                <div x-show="$store.appState.regional" class="relative">
                    <input x-model="searchQuery" type="text" placeholder="Search Team..." 
                        class="bg-slate-950 border border-slate-800 text-[10px] font-bold text-white px-3 py-1.5 rounded-lg focus:outline-none focus:border-orange-500 w-48">
                    <svg class="absolute right-2.5 top-1/2 -translate-y-1/2 h-3.5 w-3.5 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <main class="max-w-4xl mx-auto p-6">
        <!-- Event Selection -->
        <template x-if="!$store.appState.regional">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <template x-for="event in availableEvents.filter(e => e.season == $store.appState.season)" :key="event.key">
                    <button @click="location.href = $store.appState.url('matches', event.key)"
                        class="flex items-center justify-between p-4 bg-slate-900 border border-slate-800 rounded-xl hover:border-orange-500 transition-all group">
                        <div class="text-left">
                            <p class="text-[10px] text-slate-500 font-black uppercase tracking-widest" x-text="event.key"></p>
                            <p class="font-black text-white text-sm" x-text="event.name"></p>
                        </div>
                        <svg class="w-5 h-5 text-slate-700 group-hover:text-orange-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7" />
                        </svg>
                    </button>
                </template>
            </div>
        </template>

        <!-- Match Listing -->
        <template x-if="$store.appState.regional">
            <div class="space-y-3">
                <template x-if="loading">
                    <div class="py-12 flex flex-col items-center">
                        <div class="loading-spinner"></div>
                        <p class="loading-text">Syncing Matches...</p>
                    </div>
                </template>
                <template x-for="match in filteredMatches" :key="match.key">
                    <a :href="$store.appState.url('matches', $store.appState.regional, match.match_number)" 
                       class="flex items-center justify-between p-4 bg-slate-900 border border-slate-800 rounded-2xl hover:border-orange-500 transition-all group">
                        <div class="flex items-center gap-6">
                            <div class="flex flex-col">
                                <span class="text-[10px] font-black text-orange-500 uppercase tracking-widest" x-text="match.type"></span>
                                <span class="font-black text-white text-lg" x-text="'#' + match.match_number"></span>
                            </div>
                            <div class="h-8 w-px bg-slate-800"></div>
                            <div class="flex flex-col gap-1">
                                <div class="flex items-center gap-2">
                                    <div class="w-1.5 h-3 bg-red-600 rounded-full"></div>
                                    <div class="flex gap-2">
                                        <template x-for="tk in match.alliances.red.team_keys">
                                            <span class="text-[10px] font-black text-red-400" x-text="tk.substring(3)"></span>
                                        </template>
                                    </div>
                                </div>
                                <div class="flex items-center gap-2">
                                    <div class="w-1.5 h-3 bg-blue-600 rounded-full"></div>
                                    <div class="flex gap-2">
                                        <template x-for="tk in match.alliances.blue.team_keys">
                                            <span class="text-[10px] font-black text-blue-400" x-text="tk.substring(3)"></span>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="text-right">
                                <div class="flex items-center gap-2">
                                    <span class="text-lg font-black text-red-500" x-text="match.alliances.red.score"></span>
                                    <span class="text-slate-600 text-xs">-</span>
                                    <span class="text-lg font-black text-blue-500" x-text="match.alliances.blue.score"></span>
                                </div>
                            </div>
                            <svg class="w-5 h-5 text-slate-700 group-hover:text-orange-500 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        </div>
                    </a>
                </template>
            </div>
        </template>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/frc-config.js"></script>
    <script src="js/matches-app.js"></script>
</body>
</html>
