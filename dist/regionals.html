<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regional Explorer - Ares Scout 2026</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/theme.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="page-body" x-data="regionalsApp">
    <nav class="top-nav">
        <div class="top-nav__inner">
            <div class="top-nav__left">
                <button @click="location.href='dashboard.html'" class="back-btn--shadow">
                    <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7">
                        </path>
                    </svg>
                </button>
                <div style="width: 40px;"></div>
            </div>
            <div class="top-nav__center">
                <img src="img/logo.png" alt="Logo" class="brand__logo--nav">
                <span class="brand__subtitle--orange">Laissez Faire</span>
            </div>
            <div class="top-nav__right">
            </div>
        </div>
    </nav>

    <section class="page-hero">
        <h1 class="page-hero__title">Regional Explorer</h1>
    </section>

    <!-- Global Regional Search -->
    <div class="filter-panel px-4 mb-6">
        <div class="filter-group col-span-full">
            <label class="form-label--filter uppercase tracking-widest text-[10px] text-slate-500 font-black">Search
                Regionals</label>
            <div class="relative">
                <input x-model="searchQuery" type="text" placeholder="Search by name, key, or team #..."
                    class="form-input--search pl-10">
                <svg class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-slate-500" fill="none"
                    stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>
        </div>
    </div>

    <!-- Main Regionals List -->
    <div class="match-grid">
        <template x-for="event in filteredRegionals" :key="event.key">
            <div class="match-card-new"
                :class="expandedRegionals.includes(event.key) ? 'ring-2 ring-orange-500/50' : ''">
                <!-- Regional Header -->
                <div @click="toggleRegional(event.key)" class="match-card__header cursor-pointer">
                    <div class="flex flex-col">
                        <span class="text-[10px] text-orange-500 font-black uppercase tracking-widest"
                            x-text="event.season"></span>
                        <div class="flex items-center gap-3">
                            <span class="font-black text-white text-lg leading-tight" x-text="event.name"></span>
                            <a @click.stop="" :href="'https://www.thebluealliance.com/event/' + event.key"
                                target="_blank"
                                class="px-2.5 py-1 bg-blue-600/10 hover:bg-blue-600 text-blue-400 hover:text-white rounded border border-blue-500/20 text-[9px] font-black uppercase tracking-tighter transition-all flex items-center gap-1.5 ml-2">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                                </svg>
                                TBA
                            </a>
                        </div>
                        <span class="text-[10px] text-slate-500 font-bold uppercase tracking-wider"
                            x-text="event.key"></span>
                    </div>
                    <svg class="match-card__chevron transition-transform duration-300"
                        :class="expandedRegionals.includes(event.key) ? 'rotate-180' : ''" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path>
                    </svg>
                </div>

                <!-- Expanded Regional Content -->
                <div x-show="expandedRegionals.includes(event.key)" x-collapse class="match-expanded">
                    <!-- Loading State -->
                    <template x-if="regionalData[event.key]?.loading">
                        <div class="p-8 flex flex-col items-center justify-center space-y-3 font-theme">
                            <div class="loading-spinner"></div>
                            <p class="text-[10px] font-black text-orange-500 uppercase tracking-[0.3em]">Syncing
                                Regional Intel...</p>
                        </div>
                    </template>

                    <!-- Data Display -->
                    <template x-if="!regionalData[event.key]?.loading && regionalData[event.key]">
                        <div x-data="{ tab: 'matches' }">
                            <!-- Inner Team Search -->
                            <div class="px-4 py-3 bg-slate-900/80 border-b border-slate-800 flex items-center gap-3">
                                <div class="relative flex-1">
                                    <input x-model="teamSearchQuery" type="text"
                                        placeholder="Search team # or name in this regional..."
                                        class="w-full bg-slate-950 border border-slate-800 rounded-lg py-1.5 pl-8 pr-3 text-[10px] text-white focus:outline-none focus:border-orange-500/50 transition-all">
                                    <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 h-3.5 w-3.5 text-slate-500"
                                        fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                                    </svg>
                                </div>
                            </div>

                            <!-- Section Tabs -->
                            <div class="flex p-1 bg-slate-900/50 rounded-2xl border border-slate-800/50 m-4">
                                <button @click="tab = 'matches'"
                                    :class="tab === 'matches' ? 'bg-orange-500 text-white shadow-lg' : 'text-slate-500 hover:text-slate-300'"
                                    class="flex-1 py-3 text-[10px] font-black uppercase tracking-widest rounded-xl transition-all duration-300">
                                    Matches
                                </button>
                                <button @click="tab = 'rankings'"
                                    :class="tab === 'rankings' ? 'bg-orange-500 text-white shadow-lg' : 'text-slate-500 hover:text-slate-300'"
                                    class="flex-1 py-3 text-[10px] font-black uppercase tracking-widest rounded-xl transition-all duration-300">
                                    Rankings
                                </button>
                                <button @click="tab = 'prizes'"
                                    :class="tab === 'prizes' ? 'bg-orange-500 text-white shadow-lg' : 'text-slate-500 hover:text-slate-300'"
                                    class="flex-1 py-3 text-[10px] font-black uppercase tracking-widest rounded-xl transition-all duration-300">
                                    Prizes
                                </button>
                            </div>

                            <!-- Tab Contents -->
                            <div class="space-y-4 px-4 pb-4">
                                <!-- Matches Tab -->
                                <div x-show="tab === 'matches'" class="space-y-3">
                                    <template x-for="match in getFilteredMatches(event.key)"
                                        :key="match.matchNumber + match.compLevel">
                                        <div
                                            class="bg-slate-800/20 border border-slate-700/30 rounded-lg overflow-hidden transition-all duration-300">
                                            <!-- Match Header -->
                                            <div @click="toggleMatch(event.key + match.compLevel + match.matchNumber)"
                                                class="p-3 flex items-center justify-between cursor-pointer hover:bg-slate-800/40">
                                                <div class="flex flex-col">
                                                    <span
                                                        class="text-[10px] font-black text-orange-500 uppercase tracking-tighter"
                                                        x-text="match.description"></span>
                                                    <span class="text-[9px] text-slate-500 font-bold"
                                                        x-text="match.actualStartTime ? formatDate(match.actualStartTime) : (match.scheduledTime ? 'Scheduled: ' + formatDate(match.scheduledTime) : 'Pending')"></span>
                                                </div>
                                                <div class="flex items-center gap-4">
                                                    <template x-if="match.actualStartTime">
                                                        <div
                                                            class="flex items-center gap-2 px-2 py-1 bg-slate-900/50 rounded border border-slate-700/50">
                                                            <span class="text-[11px] font-black text-red-500"
                                                                x-text="match.scoreRedFinal || 0"></span>
                                                            <div class="w-1.5 h-1.5 rounded-full bg-slate-700"></div>
                                                            <span class="text-[11px] font-black text-blue-500"
                                                                x-text="match.scoreBlueFinal || 0"></span>
                                                        </div>
                                                    </template>
                                                    <svg class="h-4 w-4 text-slate-600 transition-transform duration-300"
                                                        :class="expandedMatches.includes(event.key + match.compLevel + match.matchNumber) ? 'rotate-180' : ''"
                                                        fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                        <path stroke-linecap="round" stroke-linejoin="round"
                                                            stroke-width="3" d="M19 9l-7 7-7-7"></path>
                                                    </svg>
                                                </div>
                                            </div>

                                            <!-- Expanded Match Details -->
                                            <div x-show="expandedMatches.includes(event.key + match.compLevel + match.matchNumber)"
                                                x-collapse
                                                class="p-4 border-t border-slate-800/80 bg-slate-900/40 space-y-4">
                                                <!-- Alliances -->
                                                <div class="grid grid-cols-2 gap-4 text-center">
                                                    <div class="space-y-2">
                                                        <span
                                                            class="text-[9px] font-black text-red-500 uppercase tracking-widest border-b border-red-500/20 pb-1 block">Red
                                                            Alliance</span>
                                                        <template x-for="t in match.alliances.red.team_keys">
                                                            <div @click.stop="location.href='teams.html?team=' + t.replace('frc','')"
                                                                class="text-[10px] text-white font-bold bg-slate-800/50 py-1.5 px-3 rounded border border-slate-700/50 cursor-pointer hover:bg-red-500/10 hover:border-red-500/30 transition-all flex items-center justify-between">
                                                                <span x-text="'#' + t.replace('frc','')"></span>
                                                                <span
                                                                    class="text-[8px] opacity-40 font-bold truncate max-w-[60px]"
                                                                    x-text="getTeamData(t.replace('frc',''), event.key).nickname"></span>
                                                            </div>
                                                        </template>
                                                    </div>
                                                    <div class="space-y-2">
                                                        <span
                                                            class="text-[9px] font-black text-blue-500 uppercase tracking-widest border-b border-blue-500/20 pb-1 block">Blue
                                                            Alliance</span>
                                                        <template x-for="t in match.alliances.blue.team_keys">
                                                            <div @click.stop="location.href='teams.html?team=' + t.replace('frc','')"
                                                                class="text-[10px] text-white font-bold bg-slate-800/50 py-1.5 px-3 rounded border border-slate-700/50 cursor-pointer hover:bg-blue-500/10 hover:border-blue-500/30 transition-all flex items-center justify-between">
                                                                <span x-text="'#' + t.replace('frc','')"></span>
                                                                <span
                                                                    class="text-[8px] opacity-40 font-bold truncate max-w-[60px]"
                                                                    x-text="getTeamData(t.replace('frc',''), event.key).nickname"></span>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </div>

                                                <!-- Actions -->
                                                <div class="flex gap-2">
                                                    <a :href="`scout.html?season=${event.season}&regional=${event.key}&type=${match.compLevel === 'qm' ? 'Qualification' : (match.compLevel === 'p' ? 'Practice' : (match.compLevel === 'f' ? 'Finals' : 'Playoffs'))}&match=${match.matchNumber}`"
                                                        class="flex-1 py-1.5 bg-orange-600 hover:bg-orange-500 text-white rounded text-[10px] font-black uppercase flex items-center justify-center gap-2 shadow-lg shadow-orange-900/20 transition-all">
                                                        Scout Match
                                                    </a>
                                                    <a :href="FRC_CONFIG.getTbaMatchUrl(event.key, match.compLevel === 'qm' ? 'Qualification' : (match.compLevel === 'p' ? 'Practice' : (match.compLevel === 'f' ? 'Finals' : 'Playoffs')), match.matchNumber)"
                                                        target="_blank"
                                                        class="px-3 py-1.5 bg-blue-600 hover:bg-blue-500 text-white rounded text-[10px] font-black uppercase">
                                                        TBA
                                                    </a>
                                                </div>
                                            </div>
                                        </div>
                                    </template>
                                    <template x-if="!getFilteredMatches(event.key).length">
                                        <p class="text-[10px] text-slate-700 italic text-center py-4">No matches found
                                            for this regional.</p>
                                    </template>
                                </div>

                                <!-- Rankings Tab -->
                                <div x-show="tab === 'rankings'" class="space-y-3">
                                    <template x-if="regionalData[event.key]?.rankings?.rankings?.length">
                                        <div class="space-y-3">
                                            <template x-for="rank in getFilteredRankings(event.key)"
                                                :key="rank.team_key">
                                                <div
                                                    class="bg-slate-800/20 border border-slate-700/30 rounded-lg overflow-hidden">
                                                    <!-- Team Header -->
                                                    <div @click="toggleTeam(rank.team_key.replace('frc',''), event.key)"
                                                        class="p-3 flex items-center justify-between cursor-pointer hover:bg-slate-800/40">
                                                        <div class="flex items-center gap-4">
                                                            <div
                                                                class="w-10 h-10 rounded-xl bg-slate-950 flex items-center justify-center border border-slate-800">
                                                                <span class="text-xs font-black text-orange-500"
                                                                    x-text="rank.rank"></span>
                                                            </div>
                                                            <div class="flex flex-col">
                                                                <span class="text-lg font-black text-white"
                                                                    x-text="'#' + rank.team_key.replace('frc','')"></span>
                                                                <span
                                                                    class="text-[9px] text-slate-500 font-bold uppercase truncate max-w-[120px]"
                                                                    x-text="getTeamData(rank.team_key.replace('frc',''), event.key).nickname"></span>
                                                            </div>
                                                        </div>
                                                        <div class="flex flex-col items-end">
                                                            <span class="text-xs font-bold text-slate-200"
                                                                x-text="rank.record ? `${rank.record.wins}-${rank.record.losses}-${rank.record.ties}` : '0-0-0'"></span>
                                                            <span class="text-[8px] font-black text-orange-500"
                                                                x-text="rank.sort_orders ? rank.sort_orders[0].toFixed(2) + ' RP' : '0 RP'"></span>
                                                        </div>
                                                    </div>

                                                    <!-- Team Expansion -->
                                                    <div x-show="expandedTeams.includes(event.key + '_' + rank.team_key.replace('frc',''))"
                                                        x-collapse
                                                        class="p-4 bg-slate-900/60 border-t border-slate-800 space-y-6">
                                                        <!-- Pit Scouts -->
                                                        <div class="space-y-3">
                                                            <h4
                                                                class="text-[9px] font-black uppercase tracking-[0.2em] text-orange-500 border-b border-orange-500/20 pb-1">
                                                                Pit Scouting</h4>
                                                            <template
                                                                x-for="report in (pitReports[parseInt(rank.team_key.replace('frc',''))] || [])"
                                                                :key="report.id">
                                                                <div @click="togglePitReport(report.id)"
                                                                    class="bg-slate-800/30 p-3 rounded-lg border border-slate-700/30 hover:border-orange-500/30 transition-all cursor-pointer">
                                                                    <div class="flex justify-between items-center mb-1">
                                                                        <span class="text-[9px] font-black text-white"
                                                                            x-text="'By Team #' + report.meta.scouterTeam"></span>
                                                                        <span
                                                                            class="text-[8px] text-slate-500 font-bold"
                                                                            x-text="formatDate(report.createdAt)"></span>
                                                                    </div>
                                                                    <div x-show="expandedPitReports.includes(report.id)"
                                                                        x-collapse
                                                                        class="mt-2 text-[9px] space-y-2 pt-2 border-t border-slate-700/30">
                                                                        <div class="grid grid-cols-2 gap-2">
                                                                            <span class="text-slate-400">Drive: <b
                                                                                    class="text-white"
                                                                                    x-text="report.data?.driveBase"></b></span>
                                                                            <span class="text-slate-400">Intake: <b
                                                                                    class="text-white"
                                                                                    x-text="report.data?.intake"></b></span>
                                                                        </div>
                                                                        <p class="text-slate-300 italic"
                                                                            x-text="report.data?.generalComments || 'No comments'">
                                                                        </p>
                                                                    </div>
                                                                </div>
                                                            </template>
                                                            <template
                                                                x-if="!(pitReports[parseInt(rank.team_key.replace('frc',''))] || []).length">
                                                                <p class="text-[9px] text-slate-700 italic">No pit
                                                                    scouting reports on file.</p>
                                                            </template>
                                                        </div>

                                                        <!-- Awards / Honors -->
                                                        <div class="space-y-3">
                                                            <h4
                                                                class="text-[9px] font-black uppercase tracking-[0.2em] text-slate-500 border-b border-slate-800 pb-1">
                                                                Team Honors</h4>
                                                            <div class="flex flex-wrap gap-2">
                                                                <template
                                                                    x-for="award in (regionalData[event.key].teams.find(t => t.teamNumber === parseInt(rank.team_key.replace('frc','')))?.awards || [])">
                                                                    <div class="bg-white/5 px-2 py-1 rounded border border-white/5 text-[9px] font-black text-orange-400"
                                                                        x-text="award.name"></div>
                                                                </template>
                                                                <template
                                                                    x-if="!(regionalData[event.key].teams.find(t => t.teamNumber === parseInt(rank.team_key.replace('frc','')))?.awards?.length)">
                                                                    <span class="text-[9px] text-slate-700 italic">No
                                                                        awards listed for this event.</span>
                                                                </template>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                </div>

                                <!-- Prizes Tab -->
                                <div x-show="tab === 'prizes'" class="space-y-3">
                                    <template x-for="award in getFilteredAwards(event.key)" :key="award.name">
                                        <div class="p-3 bg-slate-800/20 border border-slate-700/30 rounded-lg">
                                            <div class="text-[10px] font-black text-orange-500 uppercase tracking-widest mb-2 border-b border-orange-500/20 pb-1"
                                                x-text="award.name"></div>
                                            <div class="space-y-1.5">
                                                <template x-for="recipient in award.recipient_list">
                                                    <div class="flex items-center justify-between">
                                                        <span class="text-[11px] font-black text-slate-200"
                                                            x-text="recipient.team_key ? '#' + recipient.team_key.replace('frc', '') : 'Individual'"></span>
                                                        <span class="text-[9px] text-slate-500 font-bold"
                                                            x-text="recipient.awardee || ''"></span>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                    </template>
                                    <template x-if="!getFilteredAwards(event.key).length">
                                        <p class="text-[10px] text-slate-700 italic text-center py-4">No prizes listed
                                            for this regional.</p>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </template>
    </div>

    <!-- Firebase Configuration & Apps -->
    <script src="js/auth.js"></script>
    <script src="js/frc-config.js"></script>
    <script src="js/regionals-app.js"></script>
</body>

</html>
