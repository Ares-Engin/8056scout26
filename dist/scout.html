<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Scouting - REBUILT 2026</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/theme.js"></script>
    <script src="js/custom-events.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="page-body" x-data="scoutApp">
    <nav class="top-nav">
        <div class="top-nav__inner">
            <div class="top-nav__left">
                <button @click="location.href = $store.appState.url('dashboard')" class="back-btn--shadow">
                    <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                    </svg>
                </button>
            </div>
            <div class="top-nav__center">
                <img src="img/logo.png" alt="Logo" class="brand__logo--nav">
                <span class="brand__subtitle--orange">Laissez Faire</span>
            </div>
            <div class="top-nav__right"></div>
        </div>
    </nav>

    <section class="page-hero">
        <h1 class="page-hero__title" x-text="$store.appState.league.toUpperCase() + ' Match Scouting'"></h1>
    </section>

    <div class="container--sm">
        <!-- Section 1: Meta -->
        <section class="card">
            <h2 class="section-title"><span class="section-number">01</span> Match Information</h2>
            <div class="stack-spacing--6">
                <div class="form-grid">
                    <div>
                        <label class="form-label">Regional / Event</label>
                        <select x-model="regional" class="form-select">
                            <template x-for="event in $store.appState.availableEvents" :key="event.key">
                                <option :value="event.key" x-text="event.name"></option>
                            </template>
                        </select>
                    </div>
                </div>
                <div class="form-grid">
                    <div>
                        <label class="form-label">Match Number</label>
                        <input x-model="matchNumber" type="number" placeholder="#" class="form-input">
                    </div>
                    <div>
                        <label class="form-label">Team Number</label>
                        <input x-model="teamNumber" type="number" placeholder="#" class="form-input">
                    </div>
                </div>
                <div>
                    <label class="form-label">Match Type</label>
                    <div class="grid grid-cols-4 gap-2 mt-2">
                        <template x-for="type in ['Practice', 'Qualification', 'Playoffs', 'Finals']">
                            <button @click="matchType = type" class="btn-match-type"
                                :class="matchType === type ? 'btn-match-type--active' : 'btn-match-type--inactive'"
                                x-text="type"></button>
                        </template>
                    </div>
                </div>
                <div>
                    <label class="form-label">Alliance</label>
                    <div class="form-grid">
                        <button @click="alliance = 'Red'" class="btn-alliance" :class="alliance === 'Red' ? 'btn-alliance-red--active' : 'btn-alliance-red--inactive'">Red</button>
                        <button @click="alliance = 'Blue'" class="btn-alliance" :class="alliance === 'Blue' ? 'btn-alliance-blue--active' : 'btn-alliance-blue--inactive'">Blue</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- FRC 2026 Specific Form -->
        <template x-if="$store.appState.league === 'frc'">
            <div class="stack-spacing--6">
                <section class="card--orange">
                    <h2 class="section-title--orange"><span class="section-number">02</span> Autonomous</h2>
                    <div class="stack-spacing--4">
                        <div>
                            <label class="form-label">Auto Climb</label>
                            <select x-model="auto.level1" class="form-select">
                                <option value="none">Not Attempted</option>
                                <option value="success">Successful</option>
                                <option value="failed">Failed</option>
                            </select>
                        </div>
                        <div>
                            <label class="form-label">Auto Scored</label>
                            <div class="gap-grid">
                                <template x-for="range in ranges.auto">
                                    <button @click="auto.scored = range" class="gap-btn" :class="auto.scored === range ? 'gap-btn--active' : 'gap-btn--inactive'" x-text="range"></button>
                                </template>
                            </div>
                        </div>
                    </div>
                </section>
                
                <section class="card--blue">
                    <h2 class="section-title--blue"><span class="section-number">03</span> Teleop Shifts</h2>
                    <div class="stack-spacing--6">
                        <div>
                            <label class="form-label">Transition Shift</label>
                            <div class="gap-grid">
                                <template x-for="range in ranges.transition">
                                    <button @click="transitionShift = range" class="gap-btn" :class="transitionShift === range ? 'gap-btn--active' : 'gap-btn--inactive'" x-text="range"></button>
                                </template>
                            </div>
                        </div>
                        <div>
                            <label class="form-label">Teleop Shift A</label>
                            <div class="gap-grid">
                                <template x-for="range in ranges.teleop">
                                    <button @click="teleopShiftA = range" class="gap-btn" :class="teleopShiftA === range ? 'gap-btn--active' : 'gap-btn--inactive'" x-text="range"></button>
                                </template>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </template>

        <!-- FTC 2025 Specific Form -->
        <template x-if="$store.appState.league === 'ftc'">
            <div class="stack-spacing--6">
                <section class="card--orange">
                    <h2 class="section-title--orange"><span class="section-number">02</span> Auto Samples & Specimens</h2>
                    <div class="stack-spacing--4">
                        <div>
                            <label class="form-label">Samples Scored</label>
                            <div class="gap-grid">
                                <template x-for="n in [0,1,2,3,4,5]">
                                    <button @click="auto.samples = n" class="gap-btn" :class="auto.samples == n ? 'gap-btn--active' : 'gap-btn--inactive'" x-text="n"></button>
                                </template>
                            </div>
                        </div>
                        <div>
                            <label class="form-label">Specimens Scored</label>
                            <div class="gap-grid">
                                <template x-for="n in [0,1,2,3,4,5]">
                                    <button @click="auto.specimens = n" class="gap-btn" :class="auto.specimens == n ? 'gap-btn--active' : 'gap-btn--inactive'" x-text="n"></button>
                                </template>
                            </div>
                        </div>
                    </div>
                </section>
                
                <section class="card--purple">
                    <h2 class="section-title--purple"><span class="section-number">03</span> Endgame Ascents</h2>
                    <div class="stack-spacing--4">
                        <label class="form-label">Ascent Level</label>
                        <select x-model="endgame.ascent" class="form-select--purple">
                            <option value="none">No Ascent</option>
                            <option value="level1">Level 1 (Park/Low)</option>
                            <option value="level2">Level 2 (Mid)</option>
                            <option value="level3">Level 3 (High)</option>
                        </select>
                    </div>
                </section>
            </div>
        </template>

        <!-- Submit -->
        <button @click="submit" :disabled="loading" class="btn-submit mt-8">
            <span x-text="loading ? 'Submitting...' : 'Upload Data'"></span>
        </button>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/frc-config.js"></script>
    <script src="js/scout-app.js"></script>
</body>
</html>
