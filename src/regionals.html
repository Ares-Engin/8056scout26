<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regional Explorer - REBUILT 2026</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/theme.js"></script>
    <script src="js/custom-events.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="page-body" x-data="regionalsApp">
    <nav class="top-nav">
        <div class="top-nav__inner">
            <div class="top-nav__left">
                <button @click="location.href = $store.appState.url('dashboard')" class="back-btn--shadow">
                    <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                    </svg>
                </button>
            </div>
            <div class="top-nav__center">
                <img src="img/logo.png" alt="Logo" class="brand__logo--nav">
                <span class="brand__subtitle--orange">Laissez Faire</span>
            </div>
            <div class="top-nav__right"></div>
        </div>
    </nav>

    <section class="page-hero">
        <h1 class="page-hero__title">Regional Explorer</h1>
    </section>

    <!-- Context Header -->
    <div class="bg-slate-900 border-b border-slate-800 px-4 py-3 sticky top-[64px] z-20">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <nav class="flex items-center gap-2 text-[10px] font-black uppercase tracking-widest">
                <a @click="location.href = $store.appState.url('dashboard')" class="text-slate-500 hover:text-orange-500 cursor-pointer" x-text="$store.appState.season"></a>
                <span class="text-slate-700">/</span>
                <span class="text-white">Regionals</span>
            </nav>
            <div class="flex items-center gap-4">
                <div class="relative">
                    <input x-model="searchQuery" type="text" placeholder="Search Regional..." 
                        class="bg-slate-950 border border-slate-800 text-[10px] font-bold text-white px-3 py-1.5 rounded-lg focus:outline-none focus:border-orange-500 w-48">
                    <svg class="absolute right-2.5 top-1/2 -translate-y-1/2 h-3.5 w-3.5 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <main class="max-w-4xl mx-auto p-6">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <template x-for="event in filteredRegionals" :key="event.key">
                <a :href="$store.appState.url('regionals', event.key)"
                    class="flex items-center justify-between p-4 bg-slate-900 border border-slate-800 rounded-xl hover:border-orange-500 transition-all group">
                    <div class="text-left">
                        <p class="text-[10px] text-slate-500 font-black uppercase tracking-widest" x-text="event.key"></p>
                        <p class="font-black text-white text-sm" x-text="event.name"></p>
                    </div>
                    <svg class="w-5 h-5 text-slate-700 group-hover:text-orange-500 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7" />
                    </svg>
                </a>
            </template>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/frc-config.js"></script>
    <script src="js/regionals-app.js"></script>
</body>
</html>
